[pytest]
pythonpath = .
testpaths = tests
markers =
    tc_doc: UC1 document upload BVA
    tc_fmt: UC1 file format validation
    tc_qry: UC4 query length BVA
    tc_sim: UC4 similarity threshold BVA
    tc_chunk: UC2 docling structural
    tc_ctx: UC2 LLM contextual chunk enrichment
    tc_rec: UC2 recursive split BVA
    tc_uat: acceptance / hallucination
    tc_del: UC3 document delete cascade
    tc_chat: UC4 chat session reset
    tc_rag: UC4 RAG generation
    rag_eval: RAGAS / LLM-judge evaluation (optional deps)
    gemini_live: requires GEMINI_API_KEY
    slow: slow integration tests
addopts = -v --strict-markers --tb=short
